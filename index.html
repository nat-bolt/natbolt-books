<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest & theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NatBolt" />

    <!-- Brand display font — Dagger Square loaded via @font-face in index.css -->
    <Source: /public/fonts/daggersquare.ttf (self-hosted, no external dependency) />


    <!-- Favicon / browser tab -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- iOS home screen icons (use 180px — exact size iOS requests for iPhone) -->

    <!-- Android / Chrome fallback icon -->
